name: 🐛 Bug report
description: Something doesn't work the way it should.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Loupe is a 100% offline
        single-file HTML tool — please include enough detail that we can
        reproduce the issue locally without access to your machine.

        **For security vulnerabilities**, please DO NOT open a public issue.
        Use the private [Security Advisories](https://github.com/Loupe-tools/Loupe/security/advisories/new)
        flow instead.

  - type: input
    id: loupe_version
    attributes:
      label: Loupe version
      description: Visible in the Settings/Help dialog, or at the top of `docs/index.html` as `LOUPE_VERSION`.
      placeholder: e.g. 20260420.1234
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome / Chromium
        - Firefox
        - Edge
        - Safari
        - Brave
        - Other (please specify in "Additional context")
    validations:
      required: true

  - type: input
    id: browser_version
    attributes:
      label: Browser version
      placeholder: e.g. Chrome 123.0.6312.58
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true

  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: |
        Exact steps, including the file you dropped. If possible, link to a
        sample from `examples/` in the repo — please do NOT attach real
        malware or confidential files.
      placeholder: |
        1. Open `docs/index.html` in <browser>
        2. Drop `examples/pe/notepad.exe`
        3. Press …
        4. See error
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: Browser console output
      description: Open devtools (F12) → Console. Paste any errors or warnings. Redact anything sensitive.
      render: text

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, extensions that might interfere, anything else.
