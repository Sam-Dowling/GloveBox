name: Refresh GeoIP

# Monthly cron that refreshes the bundled IPv4-country binary.
#
# What it does, end-to-end:
#
#   1. Runs `scripts/fetch_geoip.py`, which pulls the five RIR
#      delegated-stats files (ARIN, RIPE NCC, APNIC, AFRINIC, LACNIC)
#      and re-derives `vendor/geoip-country-ipv4.bin` from scratch.
#      The script prints the new size, SHA-256, and per-RIR publish
#      dates to the job log so a maintainer can sanity-check the PR.
#
#   2. Runs `scripts/update_geoip_vendored_row.py`, which rewrites
#      the geoip row of VENDORED.md in place — replacing only the
#      Snapshot date and the SHA-256 column. Idempotent: a no-op if
#      the upstream RIR data hasn't changed since the last run.
#
#   3. Runs `python make.py verify` to confirm the new SHA round-trips
#      cleanly through `scripts/verify_vendored.py`. If that fails, the
#      job fails — VENDORED.md and the binary will be out of sync, and
#      we'd rather block a broken PR than create one.
#
#   4. Opens (or updates) a Pull Request titled "chore(geoip): refresh
#      vendor/geoip-country-ipv4.bin", with the diff limited to those
#      two files. CI on the PR runs the full reproducible-build
#      pipeline, so a maintainer's only job is reviewing the row diff
#      and clicking Merge.
#
# Why this shape:
#
#   * No re-build of `docs/index.html` here. The PR's CI job
#     (`Build single-file bundle`) does that on every push, with
#     `SOURCE_DATE_EPOCH` pinned to HEAD's commit-author timestamp.
#     Rebuilding twice would just diverge the SHA.
#
#   * Cron runs on the 1st at 06:00 UTC — far enough into the day that
#     all five RIRs have published their daily snapshot but late enough
#     that the previous day's bundle isn't still mid-roll. Manual
#     dispatch is available for off-cycle refreshes.
#
#   * The PR is opened by `peter-evans/create-pull-request`, which is
#     the de-facto standard for cron-driven "open a PR with these
#     diffs" workflows. It auto-deduplicates on the branch name, so a
#     second run before the first PR merges will append commits to the
#     existing PR rather than fan out new ones.
#
#   * No write permission needed at the workflow's top level — only
#     the `refresh` job re-grants `contents: write` and
#     `pull-requests: write`, satisfying Scorecard's
#     Token-Permissions check.
#
# All third-party actions are pinned by full 40-char commit SHA (with
# the human-readable version in the trailing comment) per OpenSSF
# Scorecard's Pinned-Dependencies check. Dependabot bumps these
# weekly — see .github/dependabot.yml.

on:
  schedule:
    # Monthly, 1st of the month, 06:00 UTC.
    - cron: '0 6 1 * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: refresh-geoip
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh vendor/geoip-country-ipv4.bin
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'

      - name: Re-fetch RIR delegated-stats and rebuild binary
        run: python scripts/fetch_geoip.py

      - name: Update VENDORED.md geoip row (date + SHA-256)
        run: python scripts/update_geoip_vendored_row.py

      - name: Verify vendored SHA-256 pins round-trip
        run: python make.py verify

      - name: Show diff that will be opened as PR
        run: |
          git --no-pager diff --stat -- VENDORED.md vendor/geoip-country-ipv4.bin
          echo "---"
          git --no-pager diff -- VENDORED.md

      - name: Create or update Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          # Limit the PR diff to the two files this workflow owns.
          # The action ignores any other working-tree changes.
          add-paths: |
            VENDORED.md
            vendor/geoip-country-ipv4.bin
          branch: chore/refresh-geoip
          delete-branch: true
          commit-message: |
            chore(geoip): refresh vendor/geoip-country-ipv4.bin

            Re-derived from the five RIR delegated-stats files (ARIN,
            RIPE NCC, APNIC, AFRINIC, LACNIC). Only the bundled
            IPv4-country binary and its VENDORED.md row are updated;
            docs/index.html is rebuilt by CI on this PR with a fresh
            SOURCE_DATE_EPOCH from the merge commit.

            Generated by .github/workflows/refresh-geoip.yml.
          title: 'chore(geoip): refresh vendor/geoip-country-ipv4.bin'
          body: |
            ## Monthly GeoIP refresh

            This PR was opened automatically by
            `.github/workflows/refresh-geoip.yml` (cron: `0 6 1 * *`).

            ### What changed

            * `vendor/geoip-country-ipv4.bin` regenerated from the
              latest RIR delegated-stats files (ARIN, RIPE NCC,
              APNIC, AFRINIC, LACNIC).
            * `VENDORED.md` updated with the new snapshot date and
              SHA-256.

            ### Reviewer checklist

            - [ ] Job log shows non-zero record counts for all five
                  RIRs (any zero count = upstream FTP outage; close
                  the PR and let next month's run pick it up).
            - [ ] `Verify vendored SHA-256 pins round-trip` step is
                  green (this is the same check CI runs).
            - [ ] CI on this PR is green — it rebuilds
                  `docs/index.html` with a fresh
                  `SOURCE_DATE_EPOCH` and re-runs the full lint /
                  audit pipeline.
            - [ ] Squash-merge to keep the history a clean
                  one-commit-per-refresh.

            See `VENDORED.md` § "Bundled GeoIP database" for the
            provenance and re-derivation recipe.
          labels: |
            dependencies
            geoip
          # Sign-off keeps the commit DCO-clean even though the
          # author is the GitHub Actions bot.
          signoff: true
