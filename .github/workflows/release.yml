name: Release

# Release pipeline — rebuilds docs/index.html from source on the runner
# under a deterministic SOURCE_DATE_EPOCH (HEAD's commit-author timestamp)
# and signs the resulting bytes with Sigstore keyless. The committed tree
# no longer contains docs/index.html — the bundle is produced here, in a
# clean runner, and never round-trips through a contributor's machine.
#
# Why this shape:
#
#   * SOURCE_DATE_EPOCH = `git log -1 --format=%ct HEAD` is public, immutable
#     metadata on the release commit. Any auditor can run the same command
#     on the same tag and get the same integer, then feed it to build.py
#     to reproduce the signed bytes. No need for the workflow to "record"
#     the epoch anywhere — it IS the commit timestamp.
#
#   * LOUPE_VERSION is derived from that epoch by build.py (formatted as
#     YYYYMMDD.HHMM UTC), so the release tag (vLOUPE_VERSION) is a direct
#     function of the commit timestamp too.
#
#   * The trigger is `workflow_run` gated on a successful CI run on `main`.
#     This keeps Pages and Releases in lockstep: CI is the single entry
#     point, it decides whether a commit is shippable (build + lint +
#     static checks + vendor hash verification), and only then does this
#     workflow fire. The old `paths:` filter on src/ + vendor/ +
#     scripts/build.py was asymmetric with ci.yml's unfiltered trigger,
#     which let Pages deploy a new LOUPE_VERSION on doc-only commits
#     while Release stayed behind — the very skew this file now prevents.
#     Same-minute pushes still collapse to one Release thanks to the
#     "tag already exists → skip" guard below.
#
#   * Because workflow_run-triggered jobs default to checking out the
#     default branch's tip (which may have moved past the commit CI
#     green-lit), every `actions/checkout` here pins
#     `ref: ${{ github.event.workflow_run.head_sha || github.sha }}`
#     and `target_commitish` on the Release step uses the same SHA. The
#     released tag therefore points at exactly the commit CI validated,
#     not at whatever `main` happens to be when this job lands on a
#     runner.
#
#   * Release trusts CI's gate: verify-vendored, static-checks (CSP,
#     inline-handler audit) and lint all ran successfully before this
#     workflow was triggered (see the `if:` on the job). We deliberately
#     do NOT re-run those checks here — duplicating them would just
#     add runtime without changing the invariant.
#
# All third-party actions are pinned by full 40-char commit SHA (with
# the human-readable version in the trailing comment) per OpenSSF
# Scorecard's Pinned-Dependencies check. Dependabot bumps these
# weekly — see .github/dependabot.yml.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Top-level permissions are read-only; the `release` job below
# re-grants itself the minimum writes it actually needs. This
# satisfies Scorecard's Token-Permissions check, which flags any
# top-level `contents: write` as an over-broad default.
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    # Gate: only fire for a successful CI run on main, or a manual
    # workflow_dispatch. `workflow_run` fires on *every* CI conclusion
    # (success, failure, cancelled, skipped) so the explicit conclusion
    # check is mandatory. `head_branch` pins us to main even though the
    # top-level `branches:` filter already does — defence in depth.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    # Job-level permissions:
    #   contents: write  — required to create the git tag + GitHub
    #                      Release for the signed bundle.
    #   id-token: write  — required for Sigstore keyless signing via
    #                      GitHub's OIDC provider. Without it cosign
    #                      fails with an opaque "failed to get OIDC
    #                      token" error.
    permissions:
      contents: write
      id-token: write
      # attestations: write — required by actions/attest-build-provenance
      # to publish the SLSA v1.0 build-provenance attestation to GitHub's
      # attestation store. Without it the action fails with
      # "Resource not accessible by integration".
      attestations: write
    steps:
      # Pin the checkout to the exact commit CI green-lit. Without
      # `ref:`, workflow_run-triggered jobs default to the default
      # branch's current tip, which may have moved past head_sha by
      # the time this runner starts — that would tag / release a
      # different commit than the one that actually passed CI.
      # workflow_dispatch falls through to github.sha (the ref the
      # user dispatched).
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'

      # ──────────────────────────────────────────────────────────────
      # Reproducible build. The runner rebuilds docs/index.html from
      # source with SOURCE_DATE_EPOCH pinned to HEAD's commit-author
      # timestamp. Any auditor who checks out the tag and runs
      #     SOURCE_DATE_EPOCH=$(git log -1 --format=%ct HEAD) \
      #     TZ=UTC LC_ALL=C.UTF-8 python scripts/build.py
      # gets byte-identical output — see SECURITY.md § Reproducible Build.
      # ──────────────────────────────────────────────────────────────
      # `git log -1 --format=%ct HEAD` here reads the commit the
      # checkout step just pinned us to (head_sha), so this is the
      # same integer the auditor's local rebuild will produce.
      - name: Compute SOURCE_DATE_EPOCH from HEAD
        id: epoch
        run: |
          EPOCH=$(git log -1 --format=%ct HEAD)
          echo "epoch=${EPOCH}" >> "$GITHUB_OUTPUT"
          echo "SOURCE_DATE_EPOCH=${EPOCH}"

      - name: Build docs/index.html (deterministic)
        env:
          SOURCE_DATE_EPOCH: ${{ steps.epoch.outputs.epoch }}
          TZ: UTC
          LC_ALL: C.UTF-8
        run: python scripts/build.py

      - name: Extract LOUPE_VERSION from built bundle
        id: version
        run: |
          VER=$(grep -oP "LOUPE_VERSION = '\K[^']+" docs/index.html)
          echo "version=v${VER}" >> "$GITHUB_OUTPUT"
          echo "Built version: v${VER}"

      - name: Check if tag already exists
        id: check
        run: |
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true"  >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.version }} already exists — skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare release asset
        if: steps.check.outputs.exists == 'false'
        run: cp docs/index.html loupe.html

      # ──────────────────────────────────────────────────────────────
      # Supply-chain transparency. Every release asset ships with:
      #   loupe.html              — the bundle itself (rebuilt here)
      #   loupe.html.sha256       — plain-text SHA-256 for eyeball / CI diff
      #   loupe.html.sigstore     — Sigstore bundle (cert + sig + Rekor proof)
      #   loupe.cdx.json          — CycloneDX 1.5 SBOM (vendored libs + hash)
      #   loupe.cdx.json.sigstore — Sigstore bundle for the SBOM
      #
      # Both the bundle and the SBOM are signed via Sigstore keyless
      # (Fulcio short-lived cert issued to this workflow's OIDC identity,
      # Rekor transparency log entry). Users verify with
      # `cosign verify-blob --bundle …` anchored to the workflow identity
      # — see README § Verify your download. No long-lived key material
      # is stored in this repo.
      # ──────────────────────────────────────────────────────────────
      - name: Record SHA-256
        if: steps.check.outputs.exists == 'false'
        id: hash
        run: |
          HASH=$(sha256sum loupe.html | awk '{print $1}')
          echo "${HASH}  loupe.html" > loupe.html.sha256
          echo "hash=${HASH}" >> "$GITHUB_OUTPUT"
          echo "SHA-256: ${HASH}"

      - name: Generate CycloneDX SBOM
        # Builds an SBOM from VENDORED.md + the just-built docs/index.html
        # so the application hash inside the SBOM matches the signed
        # release asset byte-for-byte. Honours SOURCE_DATE_EPOCH so the
        # SBOM timestamp is itself reproducible.
        if: steps.check.outputs.exists == 'false'
        env:
          SOURCE_DATE_EPOCH: ${{ steps.epoch.outputs.epoch }}
        run: python scripts/generate_sbom.py --out loupe.cdx.json

      - name: Install cosign
        if: steps.check.outputs.exists == 'false'
        uses: sigstore/cosign-installer@d7543c93d881b35a8faa02e8e3605f69b7a1ce62 # v3.10.0

      - name: Sign loupe.html with Sigstore keyless
        if: steps.check.outputs.exists == 'false'
        run: |
          cosign sign-blob \
            --yes \
            --bundle loupe.html.sigstore \
            loupe.html

      - name: Sign loupe.cdx.json with Sigstore keyless
        # Signing the SBOM binds it to the same workflow identity as
        # the bundle. Consumers can cross-verify that the components
        # list was produced by the real release pipeline, not attached
        # after the fact.
        if: steps.check.outputs.exists == 'false'
        run: |
          cosign sign-blob \
            --yes \
            --bundle loupe.cdx.json.sigstore \
            loupe.cdx.json

      - name: Self-verify signed artefacts
        # Fail the release rather than ship assets nobody can verify.
        # Identity is anchored to this workflow file on refs/heads/main
        # — the same values the README instructs downstream users to
        # pass to `cosign verify-blob`.
        if: steps.check.outputs.exists == 'false'
        env:
          COSIGN_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/heads/${{ github.ref_name }}
          COSIGN_ISSUER: https://token.actions.githubusercontent.com
        run: |
          cosign verify-blob \
            --bundle loupe.html.sigstore \
            --certificate-identity "${COSIGN_IDENTITY}" \
            --certificate-oidc-issuer "${COSIGN_ISSUER}" \
            loupe.html
          cosign verify-blob \
            --bundle loupe.cdx.json.sigstore \
            --certificate-identity "${COSIGN_IDENTITY}" \
            --certificate-oidc-issuer "${COSIGN_ISSUER}" \
            loupe.cdx.json
          echo "OK  Sigstore bundles verify against workflow identity"

      # ──────────────────────────────────────────────────────────────
      # SLSA v1.0 build provenance. actions/attest-build-provenance
      # issues a signed attestation (via the same Sigstore/Fulcio/Rekor
      # infrastructure as cosign sign-blob above) binding the exact
      # release bytes to this workflow run — the workflow file, the
      # commit SHA, the runner identity, the trigger event, and the
      # build inputs. The attestation is stored in GitHub's attestation
      # store AND emitted locally as a Sigstore bundle which we attach
      # to the GitHub Release so offline verifiers don't need the API.
      #
      # Consumers verify with either:
      #   gh attestation verify loupe.html --owner Loupe-tools
      # or (offline):
      #   cosign verify-blob-attestation \
      #     --bundle loupe.html.intoto.jsonl \
      #     --certificate-identity <workflow-identity> \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
      #     --type slsaprovenance1 \
      #     loupe.html
      #
      # This is additive: the existing cosign sign-blob bundles above
      # are unchanged. Tightens OpenSSF Scorecard's Signed-Releases
      # sub-check for provenance presence.
      # ──────────────────────────────────────────────────────────────
      - name: Generate SLSA build provenance
        if: steps.check.outputs.exists == 'false'
        id: provenance
        uses: actions/attest-build-provenance@62fc1d596301d0ab9914e1fec14dc5c8d93f65cd # v3.2.0
        with:
          subject-path: |
            loupe.html
            loupe.cdx.json

      - name: Attach provenance bundle next to release assets
        # attest-build-provenance emits a single Sigstore bundle
        # covering all `subject-path` entries. Rename it to match the
        # conventional `.intoto.jsonl` extension so Scorecard and
        # downstream verifiers detect it as build provenance.
        if: steps.check.outputs.exists == 'false'
        run: cp "${{ steps.provenance.outputs.bundle-path }}" loupe.intoto.jsonl

      # ──────────────────────────────────────────────────────────────
      # Release notes: one SHA-256 line + one link to the verify /
      # reproduce recipe in SECURITY.md. Everything else comes from
      # generate_release_notes (auto-generated commit log).
      # ──────────────────────────────────────────────────────────────
      - name: Write reproducibility notes
        if: steps.check.outputs.exists == 'false'
        run: |
          cat > release-notes.md <<EOF
          SHA-256: \`${{ steps.hash.outputs.hash }}\`

          [Verify & reproduce →](https://github.com/${{ github.repository }}/blob/${{ steps.version.outputs.version }}/SECURITY.md#verify-your-download)

          ---
          EOF

      - name: Create Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.version.outputs.version }}
          # Point the tag at exactly the commit CI validated. On
          # workflow_run this is the triggering CI run's head_sha; on
          # workflow_dispatch we fall back to github.sha (the dispatched
          # ref), which matches the checkout above. Note: the release
          # notes link to SECURITY.md#verify-your-download at this tag;
          # the tag is created by this step so the link resolves the
          # moment the release is published.
          target_commitish: ${{ github.event.workflow_run.head_sha || github.sha }}
          body_path: release-notes.md
          append_body: true
          generate_release_notes: true
          files: |
            loupe.html
            loupe.html.sha256
            loupe.html.sigstore
            loupe.cdx.json
            loupe.cdx.json.sigstore
            loupe.intoto.jsonl
