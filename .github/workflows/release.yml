name: Release

on:
  push:
    branches: [main]
    paths: [docs/index.html]

# id-token: write is required for Sigstore keyless signing via GitHub's
# OIDC provider. Without it cosign fails with an opaque "failed to get
# OIDC token" error. contents: write is required to create the release.
permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Extract version
        id: version
        run: |
          VER=$(grep -oP "LOUPE_VERSION = '\K[^']+" docs/index.html)
          echo "version=v${VER}" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: check
        run: |
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare release asset
        if: steps.check.outputs.exists == 'false'
        run: cp docs/index.html loupe.html

      # ──────────────────────────────────────────────────────────────
      # Supply-chain transparency. Every release asset ships with:
      #   loupe.html              — the bundle itself
      #   loupe.html.sha256       — plain-text SHA-256 for eyeball / CI diff
      #   loupe.html.sigstore     — Sigstore bundle (cert + sig + Rekor proof)
      #   loupe.cdx.json          — CycloneDX 1.5 SBOM (vendored libs + hash)
      #   loupe.cdx.json.sigstore — Sigstore bundle for the SBOM
      #
      # Both the bundle and the SBOM are signed via Sigstore keyless
      # (Fulcio short-lived cert issued to this workflow's OIDC identity,
      # Rekor transparency log entry). Users verify with
      # `cosign verify-blob --bundle …` anchored to the workflow identity
      # — see README § Verify your download. No long-lived key material
      # is stored in this repo.
      # ──────────────────────────────────────────────────────────────
      - name: Record SHA-256
        if: steps.check.outputs.exists == 'false'
        run: sha256sum loupe.html | awk '{print $1"  loupe.html"}' > loupe.html.sha256

      - name: Generate CycloneDX SBOM
        # Builds an SBOM from VENDORED.md + the just-built docs/index.html
        # so the application hash inside the SBOM matches the signed
        # release asset byte-for-byte. Honours SOURCE_DATE_EPOCH when
        # set but is not reproducibility-critical at this step.
        if: steps.check.outputs.exists == 'false'
        run: python scripts/generate_sbom.py --out loupe.cdx.json

      - name: Install cosign
        if: steps.check.outputs.exists == 'false'
        uses: sigstore/cosign-installer@v3

      - name: Sign loupe.html with Sigstore keyless
        if: steps.check.outputs.exists == 'false'
        run: |
          cosign sign-blob \
            --yes \
            --bundle loupe.html.sigstore \
            loupe.html

      - name: Sign loupe.cdx.json with Sigstore keyless
        # Signing the SBOM binds it to the same workflow identity as
        # the bundle. Consumers can cross-verify that the components
        # list was produced by the real release pipeline, not attached
        # after the fact.
        if: steps.check.outputs.exists == 'false'
        run: |
          cosign sign-blob \
            --yes \
            --bundle loupe.cdx.json.sigstore \
            loupe.cdx.json

      - name: Self-verify signed artefacts
        # Fail the release rather than ship assets nobody can verify.
        # Identity is anchored to this workflow file on refs/heads/main
        # — the same values the README instructs downstream users to
        # pass to `cosign verify-blob`.
        if: steps.check.outputs.exists == 'false'
        env:
          COSIGN_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/heads/${{ github.ref_name }}
          COSIGN_ISSUER: https://token.actions.githubusercontent.com
        run: |
          cosign verify-blob \
            --bundle loupe.html.sigstore \
            --certificate-identity "${COSIGN_IDENTITY}" \
            --certificate-oidc-issuer "${COSIGN_ISSUER}" \
            loupe.html
          cosign verify-blob \
            --bundle loupe.cdx.json.sigstore \
            --certificate-identity "${COSIGN_IDENTITY}" \
            --certificate-oidc-issuer "${COSIGN_ISSUER}" \
            loupe.cdx.json
          echo "OK  Sigstore bundles verify against workflow identity"

      - name: Create Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: |
            loupe.html
            loupe.html.sha256
            loupe.html.sigstore
            loupe.cdx.json
            loupe.cdx.json.sigstore
          generate_release_notes: true
