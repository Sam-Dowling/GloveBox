name: CodeQL

# GitHub's CodeQL static analysis — satisfies OpenSSF Scorecard's SAST
# check and surfaces real vulnerabilities (XSS sinks, prototype
# pollution, command injection in build scripts, etc.) in the repo's
# Security tab before they ship.
#
# Scope:
#   * javascript-typescript — analyses every .js under src/ (the
#     single-file bundle's entire source tree). The extension covers
#     TypeScript too even though Loupe is vanilla JS, which future-
#     proofs the check.
#   * python — analyses scripts/*.py (build.py, verify_vendored.py,
#     generate_sbom.py, …). These aren't user-facing but they DO
#     produce the bytes that get signed + shipped, so bugs here have
#     supply-chain impact.
#
# Loupe has no runtime package dependencies and no compiled step,
# so the `autobuild` stage is a no-op — we skip it and let CodeQL
# index the source directly. This is the standard "interpreted
# languages" recipe from the CodeQL docs.
#
# All actions pinned by full 40-char commit SHA per Scorecard's
# Pinned-Dependencies check. Dependabot bumps these weekly.

# Doc-only commits skip CodeQL on push/PR — Markdown changes can't
# alter the JS or Python AST, so re-analysing them is wasted runner
# time. The weekly cron still runs unconditionally so the Security
# tab gets refreshed regardless of commit cadence, and
# `workflow_dispatch` is unfiltered for manual reanalysis.
on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
  schedule:
    # Mondays 07:15 UTC — offset from the Scorecard cron (07:00) so
    # the two analysis jobs don't compete for runner slots.
    - cron: '15 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload SARIF results to the Security tab.
      security-events: write
      # Needed to read the repo contents for indexing.
      contents: read
      # Needed for private repos; harmless here.
      actions: read

    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
          - python

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          languages: ${{ matrix.language }}
          # security-extended adds a handful of higher-signal queries
          # that aren't in the default pack (e.g. tainted path traversal,
          # unsafe deserialisation, weak crypto). Runtime impact is
          # minor for a repo this size.
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          category: /language:${{ matrix.language }}
