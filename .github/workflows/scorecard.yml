name: Scorecard

# OpenSSF Scorecard — weekly automated supply-chain health scoring.
# Scorecard checks things like pinned dependencies, branch protection,
# token permissions, signed releases, SAST coverage, and the presence
# of a security policy. Results publish to:
#
#   * the repo's Security tab (code-scanning alerts)
#   * api.securityscorecards.dev (for the public badge in README)
#
# Runs weekly on a fixed UTC cron + on every push to main so new
# main-branch commits are scored promptly. PRs are intentionally
# excluded — Scorecard inspects repository settings and history,
# which do not change per-PR, and the action cannot publish results
# from a fork.
#
# Docs: https://github.com/ossf/scorecard-action
#       https://securityscorecards.dev
#
# All third-party actions are pinned by full 40-char commit SHA (with
# the human-readable version in the trailing comment) per Scorecard's
# own Pinned-Dependencies check. Dependabot bumps these weekly — see
# .github/dependabot.yml.

on:
  branch_protection_rule:
  schedule:
    # Mondays 07:00 UTC — a fresh score at the start of each working
    # week, off-peak for both US + EU office hours.
    - cron: '0 7 * * 1'
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload SARIF results to the Security tab.
      security-events: write
      # Needed for keyless publication of results to the public
      # Scorecard API (OIDC token → signed attestation).
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # repo_token: a fine-grained PAT with `administration: read`
          # (plus the default `contents: read` / `metadata: read`) stored
          # as the `SCORECARD_TOKEN` repo secret. The default
          # `GITHUB_TOKEN` cannot read branch-protection rules, so
          # without this Scorecard's Branch-Protection check reports
          # `?` (inconclusive) rather than a real score. See:
          # https://github.com/ossf/scorecard-action#authentication-with-fine-grained-pat-optional
          repo_token: ${{ secrets.SCORECARD_TOKEN }}
          # publish_results: true enables the public badge at
          # https://api.securityscorecards.dev/projects/github.com/Loupe-tools/Loupe
          # which is linked from README.md.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: results.sarif
