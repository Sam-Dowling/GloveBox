name: CI

# CI + Pages deployment. This is the only path that produces and
# deploys docs/index.html — the file is no longer tracked in git.
# Contributors edit src/; this workflow rebuilds, lints, audits, and
# publishes to GitHub Pages. The reproducibility invariant ("same
# source → same bytes") is exercised here on every push: build.py
# runs with SOURCE_DATE_EPOCH pinned to HEAD's commit-author timestamp
# so the CI bundle is byte-identical to any auditor's local rebuild
# from the same commit. See SECURITY.md § Reproducible Build.
#
# All third-party actions are pinned by full 40-char commit SHA (with
# the human-readable version in the trailing comment) per OpenSSF
# Scorecard's Pinned-Dependencies check. Dependabot bumps these
# weekly — see .github/dependabot.yml.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Cancel any in-flight runs on the same ref when a new push arrives.
# Saves compute and stops stale runs from racing the latest build.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Build: rebuilds docs/index.html from source under a pinned
  # SOURCE_DATE_EPOCH (HEAD's commit-author timestamp). The output's
  # SHA-256 and size are written to the GitHub Actions job summary so
  # every build has a visible, diffable supply-chain fingerprint. The
  # bundle is uploaded as an artefact so reviewers can download and
  # diff against their own local rebuild.
  # ──────────────────────────────────────────────────────────────────
  build:
    name: Build single-file bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.x'

      - name: Compute SOURCE_DATE_EPOCH from HEAD
        id: epoch
        run: |
          EPOCH=$(git log -1 --format=%ct HEAD)
          echo "epoch=${EPOCH}" >> "$GITHUB_OUTPUT"

      - name: Build docs/index.html (deterministic)
        env:
          SOURCE_DATE_EPOCH: ${{ steps.epoch.outputs.epoch }}
          TZ: UTC
          LC_ALL: C.UTF-8
        run: python scripts/build.py

      - name: Verify build output exists
        run: |
          test -s docs/index.html || { echo "::error::docs/index.html was not produced"; exit 1; }
          SIZE=$(stat -c '%s' docs/index.html)
          echo "Built docs/index.html — ${SIZE} bytes"

      - name: Record SHA-256 of docs/index.html
        run: |
          HASH=$(sha256sum docs/index.html | awk '{print $1}')
          SIZE=$(stat -c '%s' docs/index.html)
          {
            echo "## 🕵🏻 Loupe build artefact"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| File | \`docs/index.html\` |"
            echo "| Size | ${SIZE} bytes ($((SIZE / 1024)) KB) |"
            echo "| SHA-256 | \`${HASH}\` |"
            echo "| SOURCE_DATE_EPOCH | \`${{ steps.epoch.outputs.epoch }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload built bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: loupe-html
          path: docs/index.html
          retention-days: 14

      # Also upload as a Pages artefact so the deploy job downstream
      # can publish it. Only kept from pushes to main — PR builds don't
      # deploy.
      - name: Upload Pages artefact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: docs/

  # ──────────────────────────────────────────────────────────────────
  # Vendored-library hash verification. The source of truth is the
  # SHA-256 table in VENDORED.md — any drift means either a vendor
  # file was modified without rotating the pin, or a new file was
  # added without documenting it. Both are supply-chain events.
  # ──────────────────────────────────────────────────────────────────
  verify-vendored:
    name: Verify vendored SHA-256 pins
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.x'

      - name: Run verify_vendored.py
        run: python scripts/verify_vendored.py

  # ──────────────────────────────────────────────────────────────────
  # Static HTML / source checks. These enforce the invariants that
  # make Loupe's threat model credible:
  #   - CSP meta tag is present in the built bundle
  #   - No HTML-attribute event handlers (onclick="…", onerror="…")
  #     in the built bundle — CSP blocks them, but catching them at
  #     build time surfaces author mistakes before they ship
  #   - No real eval / new Function call sites in src/ (ESLint's
  #     AST-aware rules handle this; a raw grep would false-positive
  #     on the detection-regex patterns in pdf-renderer, svg-renderer,
  #     osascript-renderer, etc.)
  # ──────────────────────────────────────────────────────────────────
  static-checks:
    name: Static HTML + source checks
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download built bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: loupe-html
          path: docs

      - name: CSP meta tag present
        run: |
          if ! grep -q 'http-equiv="Content-Security-Policy"' docs/index.html; then
            echo "::error file=docs/index.html::Content-Security-Policy meta tag is missing from the built bundle"
            exit 1
          fi
          echo "OK  CSP meta tag present"

      - name: CSP includes default-src 'none'
        run: |
          if ! grep -q "default-src 'none'" docs/index.html; then
            echo "::error file=docs/index.html::CSP no longer starts with default-src 'none' — threat-model regression"
            exit 1
          fi
          echo "OK  CSP default-src 'none' present"

      - name: No HTML-attribute event handlers in built bundle
        # Match attribute handlers like `onclick="…"` / `onerror='…'`
        # but NOT the string "on" appearing inside JS / CSS / text.
        # Anchored on whitespace + `on<word>` + `=` + quote.
        run: |
          set +e
          HITS=$(grep -nE '[[:space:]]on[a-z]+[[:space:]]*=[[:space:]]*"' docs/index.html \
               | grep -v 'http-equiv=')
          HITS2=$(grep -nE "[[:space:]]on[a-z]+[[:space:]]*=[[:space:]]*'" docs/index.html)
          set -e
          if [ -n "$HITS$HITS2" ]; then
            echo "::error file=docs/index.html::Inline HTML event handler attribute(s) found — CSP blocks these, fix at source:"
            echo "$HITS"
            echo "$HITS2"
            exit 1
          fi
          echo "OK  No inline HTML event-handler attributes"

      - name: No suspicious top-level CSP relaxations
        # Guard against someone loosening the CSP to 'unsafe-eval' or
        # allowing remote hosts. script-src 'unsafe-inline' is OK
        # (it's the whole delivery mechanism) but 'unsafe-eval' is not.
        #
        # The audit is scoped to the top-level <meta http-equiv="Content-
        # Security-Policy"> content attribute only. A raw grep over the
        # whole bundle false-positives on YARA rules and renderer code
        # that legitimately detect 'unsafe-eval' / remote hosts inside
        # *analysed* files (e.g. browser-extension manifests, SVGs).
        run: |
          python3 - <<'PY'
          import re, sys
          html = open('docs/index.html', encoding='utf-8', errors='replace').read()
          m = re.search(
              r'<meta\s+http-equiv="Content-Security-Policy"\s+content="([^"]+)"',
              html,
          )
          if not m:
              print("::error file=docs/index.html::CSP meta tag not found in built bundle")
              sys.exit(1)
          csp = m.group(1)
          print(f"Loupe top-level CSP: {csp}")
          if "'unsafe-eval'" in csp:
              print("::error file=docs/index.html::CSP contains 'unsafe-eval' — breaks the 'no code evaluation' guarantee in SECURITY.md")
              sys.exit(1)
          if re.search(r'(default-src|script-src|connect-src|img-src)[^;]*https?://', csp):
              print("::error file=docs/index.html::CSP references a remote host — Loupe must remain 100% offline")
              sys.exit(1)
          print("OK  CSP has no unsafe-eval and no remote hosts")
          PY

  # ──────────────────────────────────────────────────────────────────
  # ESLint over src/. Deliberately minimal config (see eslint.config.mjs
  # header for rationale). This is a foot-gun catcher for real bugs
  # and the no-eval / no-new-func guarantees — it is NOT a style
  # enforcer. Kept as a separate job so a lint regression doesn't
  # block the build artefact from being produced and inspected.
  # ──────────────────────────────────────────────────────────────────
  lint:
    name: ESLint (src/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'

      # Pinned to a concrete minor so CI output is deterministic and matches
      # what developers get locally with the same invocation. Bump this in
      # lockstep with local dev environments when upgrading the ruleset.
      - name: Run ESLint
        run: npx --yes eslint@9.39.4 --config eslint.config.mjs "src/**/*.js"

  # ──────────────────────────────────────────────────────────────────
  # Deploy the built bundle to GitHub Pages. Runs only on pushes to
  # main, only after build + static-checks + lint + verify-vendored
  # all pass. This replaces the old "commit docs/index.html to git"
  # dance — Pages now serves the CI-produced bytes directly.
  #
  # Requires repository Pages settings to be set to "GitHub Actions"
  # as the build source (Settings → Pages → Build and deployment →
  # Source → GitHub Actions).
  # ──────────────────────────────────────────────────────────────────
  deploy-pages:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build, verify-vendored, static-checks, lint]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
